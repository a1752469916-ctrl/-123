name: Daily Academic Scrape & Analyze

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write  # 允许推送更新后的数据文件

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 anthropic lxml

      - name: Run scraper
        run: python scrape_journals.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run AI analysis
        run: python analyze_papers.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: daily update $(date -u +'%Y-%m-%d')"
          git push
